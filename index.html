<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <main>
        <div class="tech-header">
            <h1>🎬 NETFLIX TECH 💻</h1>
            <p class="tech-subtitle">Celebrando a tecnologia</p>
        </div>

        <p class="welcome-text">Selecione seu perfil :</p>

        <section class="profiles">
          <ul>
            <li>
              <a href="catalogo/catalogo.html" class="perfil" data-perfil="frontend">
                <figure class="profile">
                  <img class="imagem_perfil" src="assets/masculino.png" alt="Frontend Dev">
                  <figcaption>Frontend Dev</figcaption>
                </figure>
              </a>
            </li>

            <li>
              <a href="catalogo/catalogo.html" class="perfil" data-perfil="backend">
                <figure class="profile">
                  <img class="imagem_perfil" src="assets/feminino.png" alt="Backend Dev">
                  <figcaption>Backend Dev</figcaption>
                </figure>
              </a>
            </li>

            <li>
              <a href="catalogo/catalogo.html" class="perfil" data-perfil="fullstack">
                <figure class="profile">
                  <img class="imagem_perfil" src="assets/Gemini_Generated_Image_vx3ytlvx3ytlvx3y (1).png" alt="Full Stack">
                  <figcaption>Full Stack</figcaption>
                </figure>
              </a>
            </li>

            <li>
              <a href="catalogo/catalogo.html" class="perfil" data-perfil="devops">
                <figure class="profile">
                  <img class="imagem_perfil" src="assets/Gemini_Generated_Image_vx3ytlvx3ytlvx3y.png" alt="DevOps">
                  <figcaption>DevOps</figcaption>
                </figure>
              </a>
            </li>
          </ul>
        </section>

    </main>
    <script src="js/index.js"></script>
    <script src="script.js" defer   ></script>
</body>
</html>
